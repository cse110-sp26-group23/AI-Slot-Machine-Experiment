<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Burner — AI Slots</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="fx"></canvas>

  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span class="brand-name">TOKEN&nbsp;BURNER</span>
      <span class="brand-tag">v4.6-preview</span>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-label">Balance</span><span class="stat-value" id="balance">1000.00</span></div>
      <div class="stat"><span class="stat-label">Last Win</span><span class="stat-value win" id="last-win">0.00</span></div>
      <div class="stat mute"><span class="stat-label">Spins</span><span class="stat-value" id="spin-count">0</span></div>
      <button class="icon-btn" id="store-btn" aria-label="Token Store" title="Buy more tokens">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </button>
      <button class="icon-btn" id="sound-btn" aria-label="Toggle sound" title="Toggle sound">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <div class="machine" id="machine" data-intensity="1">
      <div class="bet-badge"><span id="bet-badge-label">LOW STAKES</span></div>
      <div class="win-line line-top"></div>
      <div class="win-line line-mid"></div>
      <div class="win-line line-bot"></div>
      <div class="reels">
        <div class="reel" id="reel-0"><div class="strip" id="strip-0"></div></div>
        <div class="reel" id="reel-1"><div class="strip" id="strip-1"></div></div>
        <div class="reel" id="reel-2"><div class="strip" id="strip-2"></div></div>
      </div>
      <div class="win-banner" id="win-banner"><span id="win-banner-text"></span></div>
    </div>

    <div class="message" id="message">Press SPIN or hit Space. Your prompt is being processed.</div>
  </main>

  <footer class="controls">
    <div class="bet">
      <span class="ctrl-label">Bet</span>
      <button class="pill" id="bet-down" aria-label="Decrease bet">−</button>
      <span class="bet-value" id="bet-display">10</span>
      <button class="pill" id="bet-up" aria-label="Increase bet">+</button>
    </div>
    <button class="spin-btn" id="spin-btn">
      <span class="spin-label">SPIN</span>
      <span class="spin-hint">SPACE</span>
    </button>
    <div class="bet">
      <button class="pill ghost" id="max-bet">MAX</button>
      <button class="pill ghost primary" id="refill-btn">BUY TOKENS</button>
    </div>
  </footer>

  <!-- Fake microtransaction store -->
  <div class="modal" id="store-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-labelledby="store-title">
      <header class="modal-head">
        <h2 id="store-title">Token Top-Up Store</h2>
        <button class="icon-btn close-btn" data-close aria-label="Close">✕</button>
      </header>
      <p class="modal-sub">Compute isn't free. Support the model. <em>(No actual payment — this is satire.)</em></p>
      <div class="packs" id="packs"></div>
      <footer class="modal-foot" id="store-foot">Transactions processed by Definitely-A-Real-Payment-Provider™.</footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
