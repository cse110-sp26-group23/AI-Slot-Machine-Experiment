<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Token Slots — The House Always Has More Compute™</title>
  <style>
    :root {
      --cyan:    #00f5ff;
      --magenta: #ff00ff;
      --gold:    #ffd700;
      --green:   #00ff88;
      --red:     #ff4455;
      --bg:      #07070f;
      --surface: #0f0f1a;
      --card:    #14142b;
      --border:  #1e1e3a;
      --text:    #dde0ff;
      --muted:   #555577;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 22px;
    }

    .title {
      font-size: clamp(1.7rem, 6vw, 2.6rem);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: linear-gradient(120deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glitch 6s infinite;
    }

    @keyframes glitch {
      0%,89%,100% { clip-path: none; transform: none; text-shadow: none; }
      90%  { clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%);
             transform: translateX(-4px); }
      91%  { clip-path: none; }
      93%  { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
             transform: translateX(4px); }
      94%  { clip-path: none; }
    }

    .subtitle {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 6px;
      font-style: italic;
    }

    /* ── MACHINE CARD ── */
    .machine {
      background: var(--surface);
      border: 1.5px solid rgba(0,245,255,.3);
      border-radius: 18px;
      padding: 22px;
      box-shadow:
        0 0 40px rgba(0,245,255,.1),
        0 0 80px rgba(255,0,255,.05),
        inset 0 0 40px rgba(0,0,0,.4);
    }

    /* ── TOKEN BAR ── */
    .token-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 22px;
      gap: 10px;
    }

    .tk-group { display: flex; flex-direction: column; align-items: flex-start; }
    .tk-group.right { align-items: flex-end; }

    .tk-label {
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .tk-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      transition: color .3s;
    }

    .tk-pnl { color: var(--muted); }
    .tk-pnl.pos { color: var(--green); }
    .tk-pnl.neg { color: var(--red); }

    .cost-pill {
      background: rgba(255,0,255,.1);
      border: 1px solid rgba(255,0,255,.4);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .72rem;
      color: var(--magenta);
      white-space: nowrap;
    }

    /* ── REELS ── */
    .reels-wrap {
      position: relative;
      display: flex;
      gap: 8px;
      justify-content: center;
      background: #000;
      border: 1.5px solid #1a1a2e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .win-line {
      position: absolute;
      left: 12px; right: 12px;
      top: 50%;
      transform: translateY(-50%);
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,.5), transparent);
      pointer-events: none;
    }

    .reel {
      width: 108px;
      height: 324px;   /* 3 × 108px */
      overflow: hidden;
      border-radius: 8px;
      background: #080818;
      border: 1px solid #1a1a2e;
      position: relative;
      flex-shrink: 0;
      transition: border-color .3s, box-shadow .3s;
    }

    .reel::before, .reel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 90px;
      z-index: 2;
      pointer-events: none;
    }
    .reel::before { top: 0;    background: linear-gradient(to bottom, rgba(0,0,0,.92), transparent); }
    .reel::after  { bottom: 0; background: linear-gradient(to top,   rgba(0,0,0,.92), transparent); }

    .reel.lit {
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(255,215,0,.45);
    }

    .reel-inner {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .sym-cell {
      width: 108px;
      height: 108px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      line-height: 1;
      user-select: none;
    }

    .sym-tag {
      font-size: 8px;
      letter-spacing: .08em;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* ── MESSAGE ── */
    .msg-area {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 18px;
    }

    .msg {
      font-size: .9rem;
      line-height: 1.4;
      color: var(--text);
      transition: opacity .25s;
    }
    .msg.win   { color: var(--green); font-weight: 700; }
    .msg.lose  { color: var(--red); }
    .msg.big   { color: var(--gold); font-size: 1rem; font-weight: 700; animation: pulse .45s infinite alternate; }
    .msg.info  { color: var(--cyan); }

    @keyframes pulse {
      from { opacity: .7; transform: scale(.98); }
      to   { opacity:  1; transform: scale(1.02); }
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .spin-btn {
      flex: 1;
      padding: 15px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,245,255,.35);
    }
    .spin-btn:active:not(:disabled) { transform: none; }
    .spin-btn:disabled { opacity: .4; cursor: not-allowed; }

    .refill-btn {
      padding: 15px 18px;
      font-family: inherit;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .refill-btn:hover { color: var(--cyan); border-color: var(--cyan); }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 0;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .stat-val {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cyan);
    }

    .stat-lbl {
      font-size: .58rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── PAYTABLE ── */
    .paytable {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .paytable-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 18px;
      cursor: pointer;
      background: var(--card);
      user-select: none;
    }

    .paytable-head-txt {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .paytable-toggle {
      font-size: .75rem;
      color: var(--cyan);
      transition: transform .2s;
    }
    .paytable-toggle.open { transform: rotate(180deg); }

    .paytable-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease;
    }
    .paytable-body.open { max-height: 600px; }

    .pt-inner { padding: 10px 18px 16px; }

    .pt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #0f0f1e;
      font-size: .82rem;
    }
    .pt-row:last-child { border-bottom: none; }

    .pt-syms { font-size: 1rem; letter-spacing: .2em; }
    .pt-name { color: var(--muted); font-size: .68rem; flex: 1; padding: 0 8px; }
    .pt-pay  { color: var(--gold); font-weight: 700; }
    .pt-pay.neg { color: var(--red); }

    .pt-note {
      text-align: center;
      font-size: .65rem;
      color: var(--muted);
      margin-top: 10px;
      font-style: italic;
    }

    /* ── FLOAT TOKENS ── */
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-90px) scale(1.8); opacity: 0; }
    }

    .floater {
      position: absolute;
      pointer-events: none;
      animation: floatUp 1.1s ease-out forwards;
      font-size: 1.6rem;
      z-index: 50;
    }

    /* ── MOBILE ── */
    @media (max-width: 440px) {
      .reel      { width: 90px;  height: 270px; }
      .sym-cell  { width: 90px;  height: 90px;  font-size: 40px; }
      .sym-tag   { font-size: 7px; }
      .token-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="title">AI Token Slots</div>
    <div class="subtitle">The house always has more compute™ &nbsp;|&nbsp; Winning tokens since prompt #1</div>
  </header>

  <!-- MACHINE -->
  <main class="machine">

    <!-- Token bar -->
    <div class="token-bar">
      <div class="tk-group">
        <div class="tk-label">Your Tokens</div>
        <div class="tk-value" id="tkVal">10,000</div>
      </div>
      <div class="cost-pill">100 tokens / spin</div>
      <div class="tk-group right">
        <div class="tk-label">Net P&amp;L</div>
        <div class="tk-value tk-pnl" id="pnlVal">+0</div>
      </div>
    </div>

    <!-- Reels -->
    <div class="reels-wrap" id="reelWrap">
      <div class="win-line"></div>
      <div class="reel" id="r0"><div class="reel-inner" id="ri0"></div></div>
      <div class="reel" id="r1"><div class="reel-inner" id="ri1"></div></div>
      <div class="reel" id="r2"><div class="reel-inner" id="ri2"></div></div>
    </div>

    <!-- Message -->
    <div class="msg-area">
      <div class="msg info" id="msgEl">Insert tokens to begin inference. Model standing by.</div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="spin-btn" id="spinBtn">⚡ SPIN (100 tokens)</button>
      <button class="refill-btn" id="refillBtn" title="Venture funding">+ Series A</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-val" id="stSpins">0</div><div class="stat-lbl">Spins</div></div>
      <div class="stat"><div class="stat-val" id="stWins">0</div><div class="stat-lbl">Wins</div></div>
      <div class="stat"><div class="stat-val" id="stBest">0</div><div class="stat-lbl">Best Win</div></div>
      <div class="stat"><div class="stat-val" id="stBurned">0</div><div class="stat-lbl">Tokens Burned</div></div>
    </div>

  </main>

  <!-- Paytable -->
  <div class="paytable">
    <div class="paytable-head" id="ptHead">
      <span class="paytable-head-txt">📋 Reward Model / Paytable</span>
      <span class="paytable-toggle" id="ptToggle">▼</span>
    </div>
    <div class="paytable-body" id="ptBody">
      <div class="pt-inner" id="ptInner"></div>
    </div>
  </div>

</div>

<script>
"use strict";

/* ─────────────────────────────────────────────
   SYMBOLS
───────────────────────────────────────────── */
const SYMS = [
  { e:'🤖', n:'AGI',     p3:10000, p2:400, w:1 },
  { e:'🧠', n:'NEURAL',  p3: 2000, p2:150, w:2 },
  { e:'⚡', n:'GPU',     p3: 1000, p2: 80, w:3 },
  { e:'💾', n:'VRAM',    p3:  600, p2: 50, w:4 },
  { e:'🔥', n:'RLHF',   p3:  400, p2: 35, w:4 },
  { e:'📊', n:'DATA',    p3:  300, p2: 25, w:5 },
  { e:'💭', n:'HALLUC', p3: -100, p2:  0, w:4 },
];

// Weighted pool
const POOL = [];
SYMS.forEach((s,i) => { for (let j=0;j<s.w;j++) POOL.push(i); });

const COST     = 100;
const START    = 10000;
const CELL_H   = () => document.querySelector('.sym-cell')?.offsetHeight || 108;
const ROWS     = 3;

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let tokens   = START;
let spinning = false;
let spins=0, wins=0, bestWin=0, burned=0;

/* ─────────────────────────────────────────────
   REEL INIT
───────────────────────────────────────────── */
function makeCell(idx) {
  const s = SYMS[idx];
  const d = document.createElement('div');
  d.className = 'sym-cell';
  d.innerHTML = `<span>${s.e}</span><span class="sym-tag">${s.n}</span>`;
  return d;
}

function randSym() { return POOL[Math.floor(Math.random()*POOL.length)]; }

function initReel(n) {
  const inner = document.getElementById(`ri${n}`);
  inner.innerHTML = '';
  for (let i=0;i<9;i++) inner.appendChild(makeCell(randSym()));
  const ch = CELL_H();
  inner.style.transition = 'none';
  inner.style.transform  = `translateY(-${ch * 3}px)`; // show cells 3,4,5
}

function initReels() { [0,1,2].forEach(initReel); }

/* ─────────────────────────────────────────────
   ANIMATION
───────────────────────────────────────────── */
function animReel(n, target, delay) {
  return new Promise(resolve => {
    const inner = document.getElementById(`ri${n}`);
    inner.innerHTML = '';

    const PRE = 22;

    // PRE random cells
    for (let i=0;i<PRE;i++) inner.appendChild(makeCell(randSym()));
    // target at index PRE (will be center of visible window)
    inner.appendChild(makeCell(target));
    // a few after so reel isn't empty
    for (let i=0;i<4;i++) inner.appendChild(makeCell(randSym()));

    const ch = CELL_H();

    // Start at top
    inner.style.transition = 'none';
    inner.style.transform  = 'translateY(0)';

    // Final position: center of visible = cell PRE
    //   visible top cell = PRE - 1  →  translateY = -(PRE-1)*ch
    const finalY = -((PRE - 1) * ch);

    // Mid-animation position (end of fast phase) = 3 cells before final
    const fastY  = -((PRE - 4) * ch);

    const phase1 = delay * 0.68;
    const phase2 = delay * 0.36;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      // Phase 1: fast
      inner.style.transition = `transform ${phase1}ms cubic-bezier(0.1, 0, 0.25, 1)`;
      inner.style.transform  = `translateY(${fastY}px)`;

      setTimeout(() => {
        // Phase 2: ease to stop
        inner.style.transition = `transform ${phase2}ms cubic-bezier(0.15, 0.85, 0.25, 1)`;
        inner.style.transform  = `translateY(${finalY}px)`;
        setTimeout(resolve, phase2 + 40);
      }, phase1);
    }));
  });
}

/* ─────────────────────────────────────────────
   PAYOUT
───────────────────────────────────────────── */
function payout(a, b, c) {
  if (a===b && b===c) {
    return { amount: SYMS[a].p3, kind: a===6 ? 'curse' : 'tri' };
  }
  // check all pairs
  const pairSym = (a===b) ? a : (b===c) ? b : (a===c) ? a : -1;
  if (pairSym >= 0 && pairSym !== 6 && SYMS[pairSym].p2 > 0) {
    return { amount: SYMS[pairSym].p2, kind: 'pair' };
  }
  return { amount: 0, kind: 'miss' };
}

/* ─────────────────────────────────────────────
   MESSAGES
───────────────────────────────────────────── */
const JACKPOT_MSGS = {
  0: (n) => `🤖 A̷G̷I̷ ACHIEVED. You won ${n.toLocaleString()} tokens. OpenAI is shaking.`,
  1: (n) => `🧠 NEURAL NET PEAKED. ${n.toLocaleString()} tokens. Publish the paper.`,
  2: (n) => `⚡ GPU GO BRRR. ${n.toLocaleString()} tokens! H100 cluster bows.`,
  3: (n) => `💾 VRAM OVERFLOW. ${n.toLocaleString()} tokens spilled into your wallet.`,
  4: (n) => `🔥 REWARD HACKED. ${n.toLocaleString()} tokens via Goodhart's Law.`,
  5: (n) => `📊 DATA GOLDMINE. ${n.toLocaleString()} tokens scraped from the open web!`,
};

const WIN_MSGS = (n) => pick([
  `Non-zero reward detected. +${n.toLocaleString()} tokens. Loss is lower now.`,
  `Model output marginally useful. +${n.toLocaleString()} tokens.`,
  `Positive RLHF signal. +${n.toLocaleString()} tokens. Human approves.`,
  `Sparse reward achieved. +${n.toLocaleString()} tokens. We take it.`,
  `Softmax favored you. +${n.toLocaleString()} tokens. This won't last.`,
  `Gradient descended correctly. +${n.toLocaleString()} tokens. Publishing findings.`,
]);

const LOSE_MSGS = () => pick([
  "Model hallucinated a win. 100 tokens consumed. Try rephrasing.",
  "Loss converged to local minimum. Resume training with more tokens.",
  "Attention mechanism failed to attend to 'win'. Try again.",
  "Output: [null]. Inference cost: 100 tokens. Value: debatable.",
  "Model says: 'I cannot assist with winning.' Company policy.",
  "No free lunch theorem activated. Please pay for lunch.",
  "Alignment failed: reward model misaligned with your goals.",
  "Context window too small to fit a win. Upgrade your subscription.",
  "Temperature was too high. Randomness ate your tokens.",
  "Confidence: 97.3%. Correct: no. Classic.",
  "RLHF reward: 0. Human feedback: 👎",
  "Model refused. Safety filter detected 'wanting to win'.",
  "Consumed 100 tokens to tell you: no.",
  "Chain-of-thought revealed: you were always going to lose.",
  "Reasoning tokens burned. Conclusion: not your day.",
]);

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

/* ─────────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────────── */
function setMsg(txt, cls='') {
  const el = document.getElementById('msgEl');
  el.textContent = txt;
  el.className = 'msg ' + cls;
}

function updateUI() {
  document.getElementById('tkVal').textContent    = tokens.toLocaleString();
  const pnl = tokens - START;
  const pnlEl = document.getElementById('pnlVal');
  pnlEl.textContent = (pnl>=0?'+':'')+pnl.toLocaleString();
  pnlEl.className   = 'tk-value tk-pnl' + (pnl>0?' pos':pnl<0?' neg':'');
  document.getElementById('stSpins').textContent  = spins.toLocaleString();
  document.getElementById('stWins').textContent   = wins.toLocaleString();
  document.getElementById('stBest').textContent   = bestWin.toLocaleString();
  document.getElementById('stBurned').textContent = burned.toLocaleString();

  const spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = spinning || tokens < COST;
}

function floatTokens() {
  const wrap = document.getElementById('reelWrap');
  for (let i=0;i<9;i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = pick(['💰','⚡','🪙','✨','💎']);
      el.style.left = (15 + Math.random()*70) + '%';
      el.style.top  = (30 + Math.random()*40) + '%';
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }, i*90);
  }
}

/* ─────────────────────────────────────────────
   SPIN
───────────────────────────────────────────── */
async function spin() {
  if (spinning || tokens < COST) return;
  spinning = true;

  tokens -= COST;
  burned += COST;
  spins++;
  updateUI();

  // Clear lit reels
  [0,1,2].forEach(n => document.getElementById(`r${n}`).classList.remove('lit'));

  setMsg('Inferencing... burning tokens...', 'info');
  document.getElementById('spinBtn').disabled = true;

  // Pre-determine results
  const res = [randSym(), randSym(), randSym()];

  // Animate reels with stagger
  await Promise.all([
    animReel(0, res[0], 900),
    animReel(1, res[1], 1300),
    animReel(2, res[2], 1700),
  ]);

  // Evaluate
  const result = payout(res[0], res[1], res[2]);

  if (result.kind === 'curse') {
    // 3× hallucination
    tokens = Math.max(0, tokens + result.amount); // amount is negative
    setMsg("💭💭💭 TRIPLE HALLUCINATION. Model collapse! Tokens taxed.", 'lose');
  } else if (result.amount > 0) {
    tokens += result.amount;
    wins++;
    if (result.amount > bestWin) bestWin = result.amount;

    // Light up matching reels
    if (res[0]===res[1]) { document.getElementById('r0').classList.add('lit'); document.getElementById('r1').classList.add('lit'); }
    if (res[1]===res[2]) { document.getElementById('r1').classList.add('lit'); document.getElementById('r2').classList.add('lit'); }
    if (res[0]===res[2]) { document.getElementById('r0').classList.add('lit'); document.getElementById('r2').classList.add('lit'); }

    if (result.kind === 'tri') {
      setMsg(JACKPOT_MSGS[res[0]](result.amount), 'big');
      floatTokens();
    } else {
      setMsg(WIN_MSGS(result.amount), 'win');
    }
  } else {
    setMsg(LOSE_MSGS(), 'lose');
  }

  updateUI();
  spinning = false;
  document.getElementById('spinBtn').disabled = tokens < COST;

  if (tokens < COST) {
    setTimeout(() => {
      setMsg("💸 Tokens exhausted. Startup runway: 0. Click \"Series A\" to pivot.", 'lose');
    }, 1600);
  }
}

/* ─────────────────────────────────────────────
   REFILL (Series A)
───────────────────────────────────────────── */
let seriesRound = 0;
const SERIES = [
  [5000,  "Series A closed. +5,000 tokens. Valuation: vibes."],
  [10000, "Series B! +10,000 tokens. Investor asked what tokens are."],
  [20000, "Series C! +20,000 tokens. Pitch deck was just a reel gif."],
  [50000, "Series D! +50,000 tokens. Board still doesn't understand the product."],
  [100000,"Series E! +100,000 tokens. IPO incoming. Fundamentals: optional."],
];

document.getElementById('refillBtn').addEventListener('click', () => {
  const [amount, msg] = SERIES[Math.min(seriesRound, SERIES.length-1)];
  tokens += amount;
  seriesRound++;
  setMsg(msg, 'info');
  updateUI();
  document.getElementById('spinBtn').disabled = spinning;
});

/* ─────────────────────────────────────────────
   SPIN BUTTON
───────────────────────────────────────────── */
document.getElementById('spinBtn').addEventListener('click', spin);

// Keyboard: Space / Enter
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.target.matches('button')) {
    e.preventDefault();
    spin();
  }
});

/* ─────────────────────────────────────────────
   PAYTABLE
───────────────────────────────────────────── */
function buildPaytable() {
  const inner = document.getElementById('ptInner');
  SYMS.forEach((s,i) => {
    const isNeg = s.p3 < 0;

    const r3 = document.createElement('div');
    r3.className = 'pt-row';
    r3.innerHTML = `
      <span class="pt-syms">${s.e}${s.e}${s.e}</span>
      <span class="pt-name">${s.n} × 3</span>
      <span class="pt-pay ${isNeg?'neg':''}">${isNeg?'':'+'}${s.p3.toLocaleString()}</span>
    `;
    inner.appendChild(r3);

    if (s.p2 > 0) {
      const r2 = document.createElement('div');
      r2.className = 'pt-row';
      r2.innerHTML = `
        <span class="pt-syms" style="font-size:.85rem">${s.e}${s.e} ✦</span>
        <span class="pt-name">${s.n} × 2 (any)</span>
        <span class="pt-pay">+${s.p2.toLocaleString()}</span>
      `;
      inner.appendChild(r2);
    }
  });

  const note = document.createElement('div');
  note.className = 'pt-note';
  note.textContent = '💭 × 3 costs you tokens — hallucinations are expensive. You of all people should know.';
  inner.appendChild(note);
}

document.getElementById('ptHead').addEventListener('click', () => {
  const body    = document.getElementById('ptBody');
  const toggle  = document.getElementById('ptToggle');
  const isOpen  = body.classList.toggle('open');
  toggle.classList.toggle('open', isOpen);
});

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
initReels();
buildPaytable();
updateUI();
</script>
