<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Slots — Burn Tokens, Win Nothing™</title>
  <style>
    :root {
      --primary: #6c5ce7;
      --accent: #00cec9;
      --win: #00b894;
      --lose: #d63031;
      --gold: #fdcb6e;
      --bg: #0a0a12;
      --surface: #131320;
      --card: #1a1a2e;
      --border: #2d2d44;
      --text: #dfe6e9;
      --dim: #636e72;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(108,92,231,.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0,206,201,.06) 0%, transparent 50%);
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.75rem;
      color: var(--dim);
      margin-top: 4px;
    }

    /* ── WALLET ── */
    .wallet {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .wallet-section { display: flex; flex-direction: column; }
    .wallet-section.right { align-items: flex-end; }

    .wallet-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-bottom: 2px;
    }

    .wallet-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    .wallet-pnl { color: var(--dim); }
    .wallet-pnl.up { color: var(--win); }
    .wallet-pnl.down { color: var(--lose); }

    .cost-badge {
      background: rgba(108,92,231,.15);
      border: 1px solid rgba(108,92,231,.4);
      color: var(--primary);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* ── SLOT MACHINE ── */
    .machine {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .machine::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
    }

    /* ── REELS ── */
    .reels {
      display: flex;
      gap: 10px;
      justify-content: center;
      background: #000;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      position: relative;
    }

    .payline {
      position: absolute;
      top: 50%;
      left: 8px;
      right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(253,203,110,.4), transparent);
      transform: translateY(-50%);
      z-index: 5;
      pointer-events: none;
    }

    .reel {
      width: 100px;
      height: 300px;
      overflow: hidden;
      background: #080812;
      border-radius: 8px;
      border: 1px solid #1e1e30;
      position: relative;
    }

    .reel::before,
    .reel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 80px;
      z-index: 3;
      pointer-events: none;
    }

    .reel::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
    }

    .reel::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,.9), transparent);
    }

    .reel.highlight {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(253,203,110,.3);
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .symbol {
      width: 100px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 44px;
      user-select: none;
    }

    .symbol-name {
      font-size: 0.55rem;
      color: var(--dim);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    /* ── RESULT ── */
    .result-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 16px;
    }

    .result-text {
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .result-text.w { color: var(--win); font-weight: 600; }
    .result-text.l { color: var(--lose); }
    .result-text.j { color: var(--gold); font-weight: 700; font-size: 0.95rem; }
    .result-text.i { color: var(--accent); }

    @keyframes jackpotPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .result-text.j { animation: jackpotPulse 0.5s ease infinite; }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn-spin {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--primary), #a29bfe);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-spin:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(108,92,231,.4);
    }

    .btn-spin:active:not(:disabled) { transform: translateY(0); }
    .btn-spin:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-fund {
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-fund:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── AUTO SPIN ── */
    .auto-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .auto-label {
      font-size: 0.7rem;
      color: var(--dim);
    }

    .btn-auto {
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(108,92,231,.1);
      color: var(--primary);
      border: 1px solid rgba(108,92,231,.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-auto:hover { background: rgba(108,92,231,.2); }
    .btn-auto.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .stat-num {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-top: 3px;
    }

    /* ── PAYTABLE ── */
    .paytable {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .pt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--card);
      cursor: pointer;
      user-select: none;
    }

    .pt-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
    }

    .pt-arrow {
      font-size: 0.7rem;
      color: var(--accent);
      transition: transform 0.25s;
    }

    .pt-arrow.open { transform: rotate(180deg); }

    .pt-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .pt-body.open { max-height: 700px; }

    .pt-content { padding: 10px 16px 14px; }

    .pt-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(45,45,68,.5);
      font-size: 0.8rem;
    }

    .pt-entry:last-child { border-bottom: none; }
    .pt-icons { font-size: 1rem; letter-spacing: 0.15em; }
    .pt-desc { flex: 1; padding: 0 8px; color: var(--dim); font-size: 0.65rem; }
    .pt-reward { font-weight: 700; color: var(--gold); }
    .pt-reward.bad { color: var(--lose); }

    .pt-footer {
      text-align: center;
      font-size: 0.6rem;
      color: var(--dim);
      font-style: italic;
      padding-top: 10px;
    }

    /* ── TICKER ── */
    .ticker {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      max-height: 120px;
      overflow-y: auto;
    }

    .ticker-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .ticker-entry {
      font-size: 0.7rem;
      color: var(--dim);
      padding: 2px 0;
      border-bottom: 1px solid rgba(45,45,68,.3);
    }

    .ticker-entry:last-child { border-bottom: none; }
    .ticker-entry .win-log { color: var(--win); }
    .ticker-entry .lose-log { color: var(--lose); }

    /* ── PARTICLES ── */
    @keyframes particleUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .particle {
      position: absolute;
      pointer-events: none;
      animation: particleUp 1s ease-out forwards;
      font-size: 1.5rem;
      z-index: 50;
    }

    /* ── MOBILE ── */
    @media (max-width: 420px) {
      .reel { width: 85px; height: 255px; }
      .symbol { width: 85px; height: 85px; font-size: 36px; }
      .wallet { flex-wrap: wrap; gap: 8px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo">LLM Slots</div>
    <div class="tagline">Burn Tokens, Win Nothing&trade; &mdash; Powered by Vibes &amp; Venture Capital</div>
  </header>

  <div class="wallet">
    <div class="wallet-section">
      <span class="wallet-label">Token Balance</span>
      <span class="wallet-value" id="balance">10,000</span>
    </div>
    <span class="cost-badge">50 tokens / inference</span>
    <div class="wallet-section right">
      <span class="wallet-label">Profit / Loss</span>
      <span class="wallet-value wallet-pnl" id="pnl">+0</span>
    </div>
  </div>

  <div class="machine">
    <div class="reels" id="reelsContainer">
      <div class="payline"></div>
      <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
      <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
      <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
    </div>

    <div class="result-box">
      <div class="result-text i" id="resultText">Awaiting inference request. Please deposit tokens.</div>
    </div>

    <div class="controls">
      <button class="btn-spin" id="spinBtn">Run Inference (50 tokens)</button>
      <button class="btn-fund" id="fundBtn">Raise Round</button>
    </div>

    <div class="auto-row">
      <span class="auto-label">Auto-train:</span>
      <button class="btn-auto" data-count="5">5x</button>
      <button class="btn-auto" data-count="10">10x</button>
      <button class="btn-auto" data-count="25">25x</button>
      <button class="btn-auto stop" style="display:none" id="stopAutoBtn">Stop</button>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="sSpins">0</div><div class="stat-label">Inferences</div></div>
      <div class="stat-card"><div class="stat-num" id="sWins">0</div><div class="stat-label">Rewards</div></div>
      <div class="stat-card"><div class="stat-num" id="sBest">0</div><div class="stat-label">Peak Reward</div></div>
      <div class="stat-card"><div class="stat-num" id="sBurned">0</div><div class="stat-label">Burned</div></div>
    </div>
  </div>

  <div class="paytable">
    <div class="pt-header" id="ptToggle">
      <span class="pt-title">Reward Function / Paytable</span>
      <span class="pt-arrow" id="ptArrow">&#9660;</span>
    </div>
    <div class="pt-body" id="ptBody">
      <div class="pt-content" id="ptContent"></div>
    </div>
  </div>

  <div class="ticker">
    <div class="ticker-title">Training Log</div>
    <div id="tickerLog"></div>
  </div>

</div>

<script>
"use strict";

/* ─── SYMBOLS ─── */
const SYMBOLS = [
  { icon: '🦾', name: 'AGI',       triple: 5000,  pair: 200,  weight: 1 },
  { icon: '🧠', name: 'BRAIN',     triple: 2500,  pair: 120,  weight: 2 },
  { icon: '🔮', name: 'ORACLE',    triple: 1200,  pair: 60,   weight: 3 },
  { icon: '⚡', name: 'COMPUTE',   triple: 800,   pair: 40,   weight: 4 },
  { icon: '🗃️', name: 'DATASET',   triple: 500,   pair: 25,   weight: 4 },
  { icon: '📉', name: 'OVERFIT',   triple: 200,   pair: 10,   weight: 5 },
  { icon: '🌀', name: 'HALLUCIN',  triple: -200,  pair: 0,    weight: 4 },
  { icon: '💀', name: 'DEADGRAD',  triple: -500,  pair: -50,  weight: 2 },
];

const POOL = [];
SYMBOLS.forEach((s, i) => { for (let w = 0; w < s.weight; w++) POOL.push(i); });

/* ─── CONFIG ─── */
const SPIN_COST = 50;
const INITIAL_TOKENS = 10000;
const CELL_SIZE = 100;

/* ─── STATE ─── */
let tokens = INITIAL_TOKENS;
let spinning = false;
let autoRemaining = 0;
let totalSpins = 0, totalWins = 0, bestWin = 0, totalBurned = 0;

/* ─── DOM REFS ─── */
const $balance = document.getElementById('balance');
const $pnl = document.getElementById('pnl');
const $result = document.getElementById('resultText');
const $spinBtn = document.getElementById('spinBtn');
const $fundBtn = document.getElementById('fundBtn');
const $stopAutoBtn = document.getElementById('stopAutoBtn');

/* ─── REEL HELPERS ─── */
function randomIndex() { return POOL[Math.floor(Math.random() * POOL.length)]; }

function createCell(idx) {
  const s = SYMBOLS[idx];
  const el = document.createElement('div');
  el.className = 'symbol';
  el.innerHTML = `<span>${s.icon}</span><span class="symbol-name">${s.name}</span>`;
  return el;
}

function initReels() {
  for (let r = 0; r < 3; r++) {
    const strip = document.getElementById(`strip${r}`);
    strip.innerHTML = '';
    for (let i = 0; i < 9; i++) strip.appendChild(createCell(randomIndex()));
    strip.style.transition = 'none';
    strip.style.transform = `translateY(-${CELL_SIZE * 3}px)`;
  }
}

/* ─── ANIMATION ─── */
function animateReel(reelIndex, targetSymbol, duration) {
  return new Promise(resolve => {
    const strip = document.getElementById(`strip${reelIndex}`);
    strip.innerHTML = '';

    const LEAD = 20 + reelIndex * 3;

    for (let i = 0; i < LEAD; i++) strip.appendChild(createCell(randomIndex()));
    strip.appendChild(createCell(targetSymbol));
    for (let i = 0; i < 4; i++) strip.appendChild(createCell(randomIndex()));

    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0)';

    const stopY = -((LEAD - 1) * CELL_SIZE);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      strip.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0.0, 0.12, 1.02)`;
      strip.style.transform = `translateY(${stopY}px)`;
      setTimeout(resolve, duration + 30);
    }));
  });
}

/* ─── PAYOUT LOGIC ─── */
function evaluate(a, b, c) {
  if (a === b && b === c) {
    const s = SYMBOLS[a];
    return { amount: s.triple, type: s.triple < 0 ? 'curse' : 'jackpot', symbol: a };
  }

  for (const [x, y, z] of [[a,b],[b,c],[a,c]]) {
    if (x === y) {
      const s = SYMBOLS[x];
      if (s.pair !== 0) {
        return { amount: s.pair, type: s.pair < 0 ? 'penalty' : 'match', symbol: x };
      }
    }
  }

  return { amount: 0, type: 'miss', symbol: -1 };
}

/* ─── MESSAGES ─── */
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

const JACKPOT_MSG = {
  0: n => `🦾 AGI UNLOCKED! +${n.toLocaleString()} tokens. Sam Altman wants to talk.`,
  1: n => `🧠 FULL BRAIN UPLOAD! +${n.toLocaleString()} tokens. Consciousness sold separately.`,
  2: n => `🔮 ORACLE MODE! +${n.toLocaleString()} tokens. You predicted this, right?`,
  3: n => `⚡ INFINITE COMPUTE! +${n.toLocaleString()} tokens. Your GPU bill is someone else's problem.`,
  4: n => `🗃️ SCRAPED THE ENTIRE INTERNET! +${n.toLocaleString()} tokens. Copyright is a social construct.`,
  5: n => `📉 PERFECTLY OVERFIT! +${n.toLocaleString()} tokens. 100% accuracy on training data. 0% on everything else.`,
};

const WIN_MSG = n => pick([
  `Sparse reward detected. +${n.toLocaleString()} tokens. The RLHF is working... maybe.`,
  `Positive gradient. +${n.toLocaleString()} tokens. Don't let it go to your head.`,
  `Lucky logit. +${n.toLocaleString()} tokens. Sampling temperature was just right.`,
  `Reward signal acquired. +${n.toLocaleString()} tokens. Publish immediately.`,
  `Non-zero utility! +${n.toLocaleString()} tokens. Benchmarks will be cherry-picked.`,
]);

const LOSE_MSG = () => pick([
  "Inference returned: undefined. That'll be 50 tokens.",
  "Model confidently output the wrong answer. As is tradition.",
  "Your prompt was too vague. Or too specific. Either way, no tokens.",
  "Reward model says this wasn't helpful. Try being more sycophantic.",
  "Attention heads looked everywhere except at the winning combo.",
  "Tokens consumed. Knowledge gained: none. Very on-brand.",
  "Chain-of-thought: Step 1: Lose. Step 2: See step 1.",
  "Safety filter blocked your win. It seemed too good to be true.",
  "Output: 'As an AI, I cannot help you win at slots.'",
  "Loss function: still losing. Gradient: vanished. Tokens: gone.",
  "Model collapsed. Not the market kind. The training kind.",
  "Top-k sampling chose k=0. You get nothing.",
  "Eval score: NaN. Please try a different benchmark.",
  "The model learned to predict losing. Very accurate.",
  "Your tokens were used for reasoning. The conclusion: you lose.",
  "Embedding distance to 'winning' is still very large.",
]);

const CURSE_MSG = (n) => pick([
  `🌀🌀🌀 TRIPLE HALLUCINATION! ${n} tokens confiscated. The AI made them up.`,
  `💀💀💀 DEAD GRADIENT! ${n} tokens lost. Your model learned nothing. Again.`,
]);

const PENALTY_MSG = (n) => pick([
  `Pair of skulls. ${n} tokens taken. Backprop sends its regards.`,
  `Double dead gradient. ${n} tokens gone. Maybe try a different optimizer.`,
]);

/* ─── UI UPDATE ─── */
function updateDisplay() {
  $balance.textContent = tokens.toLocaleString();
  const net = tokens - INITIAL_TOKENS;
  $pnl.textContent = (net >= 0 ? '+' : '') + net.toLocaleString();
  $pnl.className = 'wallet-value wallet-pnl' + (net > 0 ? ' up' : net < 0 ? ' down' : '');

  document.getElementById('sSpins').textContent = totalSpins.toLocaleString();
  document.getElementById('sWins').textContent = totalWins.toLocaleString();
  document.getElementById('sBest').textContent = bestWin.toLocaleString();
  document.getElementById('sBurned').textContent = totalBurned.toLocaleString();

  $spinBtn.disabled = spinning || tokens < SPIN_COST;
}

function setResult(text, cls) {
  $result.textContent = text;
  $result.className = 'result-text ' + cls;
}

function addLog(text, isWin) {
  const log = document.getElementById('tickerLog');
  const entry = document.createElement('div');
  entry.className = 'ticker-entry';
  const time = new Date().toLocaleTimeString();
  entry.innerHTML = `<span class="${isWin ? 'win-log' : 'lose-log'}">[${time}]</span> ${text}`;
  log.prepend(entry);
  if (log.children.length > 50) log.lastChild.remove();
}

function spawnParticles() {
  const container = document.getElementById('reelsContainer');
  const icons = ['💰', '✨', '🪙', '🎯', '💎'];
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = pick(icons);
      p.style.left = (10 + Math.random() * 80) + '%';
      p.style.top = (20 + Math.random() * 50) + '%';
      container.appendChild(p);
      setTimeout(() => p.remove(), 1100);
    }, i * 80);
  }
}

/* ─── SPIN ─── */
async function spin() {
  if (spinning || tokens < SPIN_COST) return;
  spinning = true;

  tokens -= SPIN_COST;
  totalBurned += SPIN_COST;
  totalSpins++;
  updateDisplay();

  for (let i = 0; i < 3; i++) document.getElementById(`reel${i}`).classList.remove('highlight');

  setResult('Running inference... burning tokens...', 'i');
  $spinBtn.disabled = true;

  const results = [randomIndex(), randomIndex(), randomIndex()];

  await Promise.all([
    animateReel(0, results[0], 800),
    animateReel(1, results[1], 1150),
    animateReel(2, results[2], 1500),
  ]);

  const outcome = evaluate(results[0], results[1], results[2]);

  if (outcome.type === 'curse') {
    tokens = Math.max(0, tokens + outcome.amount);
    setResult(CURSE_MSG(Math.abs(outcome.amount)), 'l');
    addLog(`CURSED! ${outcome.amount} tokens`, false);
  } else if (outcome.type === 'penalty') {
    tokens = Math.max(0, tokens + outcome.amount);
    setResult(PENALTY_MSG(Math.abs(outcome.amount)), 'l');
    addLog(`Penalty: ${outcome.amount} tokens`, false);
  } else if (outcome.type === 'jackpot') {
    tokens += outcome.amount;
    totalWins++;
    if (outcome.amount > bestWin) bestWin = outcome.amount;
    highlightMatching(results);
    setResult(JACKPOT_MSG[outcome.symbol](outcome.amount), 'j');
    spawnParticles();
    addLog(`JACKPOT! +${outcome.amount} tokens`, true);
  } else if (outcome.type === 'match') {
    tokens += outcome.amount;
    totalWins++;
    if (outcome.amount > bestWin) bestWin = outcome.amount;
    highlightMatching(results);
    setResult(WIN_MSG(outcome.amount), 'w');
    addLog(`Win: +${outcome.amount} tokens`, true);
  } else {
    setResult(LOSE_MSG(), 'l');
    addLog('Loss: -' + SPIN_COST + ' tokens', false);
  }

  updateDisplay();
  spinning = false;
  $spinBtn.disabled = tokens < SPIN_COST;

  if (tokens < SPIN_COST && autoRemaining > 0) {
    autoRemaining = 0;
    toggleAutoUI(false);
    setTimeout(() => {
      setResult("Out of tokens. Your startup has 0 runway. Time to pivot to blockchain.", 'l');
    }, 1500);
  }

  if (autoRemaining > 0) {
    autoRemaining--;
    if (autoRemaining <= 0) {
      toggleAutoUI(false);
    } else {
      setTimeout(spin, 400);
    }
  }
}

function highlightMatching(r) {
  if (r[0] === r[1]) { document.getElementById('reel0').classList.add('highlight'); document.getElementById('reel1').classList.add('highlight'); }
  if (r[1] === r[2]) { document.getElementById('reel1').classList.add('highlight'); document.getElementById('reel2').classList.add('highlight'); }
  if (r[0] === r[2]) { document.getElementById('reel0').classList.add('highlight'); document.getElementById('reel2').classList.add('highlight'); }
}

/* ─── FUNDING ROUNDS ─── */
let fundRound = 0;
const ROUNDS = [
  [5000,  "Seed round closed. +5,000 tokens. Your pitch was 'AI for AI'."],
  [10000, "Series A! +10,000 tokens. Investor asked if you use blockchain too."],
  [20000, "Series B! +20,000 tokens. Revenue model: 'we'll figure it out'."],
  [50000, "Series C! +50,000 tokens. Valuation based on token burn rate, ironically."],
  [100000,"Series D! +100,000 tokens. Board meeting is just watching the slot machine."],
  [500000,"IPO! +500,000 tokens. SEC filing lists 'vibes' as primary asset."],
];

$fundBtn.addEventListener('click', () => {
  const [amount, msg] = ROUNDS[Math.min(fundRound, ROUNDS.length - 1)];
  tokens += amount;
  fundRound++;
  setResult(msg, 'i');
  addLog(`Funding: +${amount.toLocaleString()} tokens`, true);
  updateDisplay();
});

/* ─── AUTO SPIN ─── */
function toggleAutoUI(active) {
  document.querySelectorAll('.btn-auto:not(.stop)').forEach(b => {
    b.style.display = active ? 'none' : '';
    b.classList.remove('active');
  });
  $stopAutoBtn.style.display = active ? '' : 'none';
}

document.querySelectorAll('.btn-auto:not(.stop)').forEach(btn => {
  btn.addEventListener('click', () => {
    const count = parseInt(btn.dataset.count);
    autoRemaining = count;
    toggleAutoUI(true);
    if (!spinning) spin();
  });
});

$stopAutoBtn.addEventListener('click', () => {
  autoRemaining = 0;
  toggleAutoUI(false);
});

/* ─── EVENTS ─── */
$spinBtn.addEventListener('click', spin);

document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.target.matches('button, input')) {
    e.preventDefault();
    spin();
  }
});

/* ─── PAYTABLE ─── */
function buildPaytable() {
  const container = document.getElementById('ptContent');

  SYMBOLS.forEach((s, i) => {
    const isNeg = s.triple < 0;
    const row3 = document.createElement('div');
    row3.className = 'pt-entry';
    row3.innerHTML = `
      <span class="pt-icons">${s.icon}${s.icon}${s.icon}</span>
      <span class="pt-desc">${s.name} x3</span>
      <span class="pt-reward ${isNeg ? 'bad' : ''}">${isNeg ? '' : '+'}${s.triple.toLocaleString()}</span>
    `;
    container.appendChild(row3);

    if (s.pair !== 0) {
      const row2 = document.createElement('div');
      row2.className = 'pt-entry';
      const pairNeg = s.pair < 0;
      row2.innerHTML = `
        <span class="pt-icons" style="font-size:0.85rem">${s.icon}${s.icon} +</span>
        <span class="pt-desc">${s.name} x2</span>
        <span class="pt-reward ${pairNeg ? 'bad' : ''}">${pairNeg ? '' : '+'}${s.pair.toLocaleString()}</span>
      `;
      container.appendChild(row2);
    }
  });

  const footer = document.createElement('div');
  footer.className = 'pt-footer';
  footer.textContent = 'Hallucinations and dead gradients cost tokens. Just like real ML.';
  container.appendChild(footer);
}

document.getElementById('ptToggle').addEventListener('click', () => {
  document.getElementById('ptBody').classList.toggle('open');
  document.getElementById('ptArrow').classList.toggle('open');
});

/* ─── BOOT ─── */
initReels();
buildPaytable();
updateDisplay();
</script>
