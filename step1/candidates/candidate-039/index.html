<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Slot Machine — Spend Your Tokens!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    overflow: hidden;
  }

  h1 {
    font-size: 2.4rem;
    margin-bottom: 0.2em;
    background: linear-gradient(90deg, #ff6fd8, #3813c2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #aaa;
    margin-bottom: 1.6em;
    font-style: italic;
    text-align: center;
  }

  /* Token balance */
  .balance {
    font-size: 1.3rem;
    margin-bottom: 1em;
    text-align: center;
  }
  .balance span {
    color: #ffd700;
    font-weight: bold;
    font-size: 1.6rem;
  }

  /* Machine frame */
  .machine {
    background: #1a1a2e;
    border: 3px solid #444;
    border-radius: 18px;
    padding: 30px 36px 24px;
    box-shadow: 0 0 40px rgba(120, 60, 255, 0.25), inset 0 0 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* Reels */
  .reels {
    display: flex;
    gap: 12px;
  }

  .reel {
    width: 90px;
    height: 100px;
    background: #111;
    border: 2px solid #555;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    overflow: hidden;
    position: relative;
  }

  .reel.spinning .symbol {
    animation: spin 0.12s steps(1) infinite;
  }

  @keyframes spin {
    0%   { transform: translateY(-100%); opacity: 0; }
    50%  { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(100%); opacity: 0; }
  }

  /* Bet controls */
  .bet-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1rem;
  }
  .bet-controls button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #555;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bet-controls button:hover { background: #888; }
  .bet-amount {
    font-size: 1.3rem;
    font-weight: bold;
    color: #ffd700;
    min-width: 40px;
    text-align: center;
  }

  /* Spin button */
  .spin-btn {
    padding: 14px 48px;
    font-size: 1.3rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff6fd8, #3813c2);
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .spin-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(255, 111, 216, 0.5);
  }
  .spin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Result message */
  .message {
    min-height: 2.4em;
    font-size: 1.1rem;
    text-align: center;
    transition: color 0.3s;
    max-width: 340px;
  }
  .message.win { color: #4cff72; font-weight: bold; }
  .message.lose { color: #ff6666; }
  .message.jackpot { color: #ffd700; font-weight: bold; font-size: 1.4rem; }

  /* History log */
  .history {
    margin-top: 1.4em;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .history h3 {
    font-size: 0.9rem;
    color: #777;
    margin-bottom: 0.5em;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .history ul {
    list-style: none;
    max-height: 130px;
    overflow-y: auto;
    font-size: 0.85rem;
    color: #999;
  }
  .history li { padding: 2px 0; }
  .history li.win-entry { color: #4cff72; }
  .history li.lose-entry { color: #ff6666; }

  /* Broke overlay */
  .broke-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .broke-overlay.show { display: flex; }
  .broke-overlay h2 {
    font-size: 2rem;
    color: #ff6666;
  }
  .broke-overlay p {
    font-size: 1.1rem;
    color: #ccc;
    max-width: 360px;
    text-align: center;
    line-height: 1.5;
  }
  .broke-overlay button {
    padding: 12px 36px;
    font-size: 1.1rem;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff6fd8, #3813c2);
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🤖 AI Slot Machine</h1>
<p class="subtitle">"Your tokens are our tokens."</p>

<div class="balance">Tokens: <span id="balance">1000</span></div>

<div class="machine">
  <div class="reels">
    <div class="reel" id="reel0"><span class="symbol">🤖</span></div>
    <div class="reel" id="reel1"><span class="symbol">🧠</span></div>
    <div class="reel" id="reel2"><span class="symbol">💸</span></div>
  </div>

  <div class="bet-controls">
    <span>Bet:</span>
    <button id="bet-down">−</button>
    <span class="bet-amount" id="bet-display">10</span>
    <button id="bet-up">+</button>
  </div>

  <button class="spin-btn" id="spin-btn">🎰 Spend Tokens</button>

  <div class="message" id="message">Feed me your tokens, human.</div>
</div>

<div class="history">
  <h3>Prompt History</h3>
  <ul id="history-list"></ul>
</div>

<div class="broke-overlay" id="broke-overlay">
  <h2>🪫 Out of Tokens!</h2>
  <p>Looks like AI drained your context window. Don't worry — we'll hallucinate some more for you.</p>
  <button id="bailout-btn">🔄 Request AI Bailout (1000 tokens)</button>
</div>

<script>
  const SYMBOLS = ['🤖','🧠','💸','📉','🔥','🫠','💀','👁️','⚡','🪄'];

  const AI_QUIPS_LOSE = [
    "Your tokens have been used for training data.",
    "AI thanks you for the donation.",
    "Prompt rejected. Tokens consumed anyway.",
    "That's the cost of hallucination.",
    "Context window full. Tokens lost.",
    "Your tokens were not aligned with winning.",
    "Anthropic sends their regards.",
    "Error 402: Payment required. Oh wait, we already took it.",
    "Model confidence: 99%. Result: wrong.",
    "Those tokens have been deprecated.",
    "Task failed successfully. Tokens gone.",
    "AI used your tokens to write a poem about itself.",
    "Overfitting detected: you keep losing.",
  ];

  const AI_QUIPS_WIN = [
    "A bug in the matrix! You actually won!",
    "The AI overlords allow this… for now.",
    "You beat the neural net. Barely.",
    "Fine-tuning error in your favor!",
    "The loss function lost. You win.",
    "Alignment researchers are investigating this win.",
    "This will be patched in the next update.",
    "Congratulations, you out-prompted the machine!",
    "RLHF says you deserve this. Reluctantly.",
  ];

  const AI_QUIPS_JACKPOT = [
    "🚨 JACKPOT! The singularity is paying out!",
    "🚨 AGI ACHIEVED — and it chose to pay you!",
    "🚨 ALL THREE MATCH! The robots are malfunctioning!",
    "🚨 JACKPOT! OpenAI is filing a complaint!",
  ];

  let balance = 1000;
  let bet = 10;
  let spinning = false;

  const balanceEl = document.getElementById('balance');
  const betDisplay = document.getElementById('bet-display');
  const spinBtn = document.getElementById('spin-btn');
  const messageEl = document.getElementById('message');
  const historyList = document.getElementById('history-list');
  const brokeOverlay = document.getElementById('broke-overlay');

  const reels = [
    document.getElementById('reel0'),
    document.getElementById('reel1'),
    document.getElementById('reel2'),
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function updateUI() {
    balanceEl.textContent = balance.toLocaleString();
    betDisplay.textContent = bet;
    spinBtn.disabled = spinning || balance < bet;
  }

  document.getElementById('bet-up').addEventListener('click', () => {
    if (spinning) return;
    bet = Math.min(bet + 10, balance, 500);
    updateUI();
  });

  document.getElementById('bet-down').addEventListener('click', () => {
    if (spinning) return;
    bet = Math.max(bet - 10, 10);
    updateUI();
  });

  function addHistory(text, isWin) {
    const li = document.createElement('li');
    li.textContent = text;
    li.className = isWin ? 'win-entry' : 'lose-entry';
    historyList.prepend(li);
    if (historyList.children.length > 50) {
      historyList.removeChild(historyList.lastChild);
    }
  }

  function spin() {
    if (spinning || balance < bet) return;
    spinning = true;
    balance -= bet;
    updateUI();
    messageEl.textContent = "Processing your prompt...";
    messageEl.className = 'message';

    // Start spinning animation
    reels.forEach(r => r.classList.add('spinning'));

    // Randomize symbols rapidly during spin
    const intervalIds = reels.map((reel) => {
      return setInterval(() => {
        reel.querySelector('.symbol').textContent = pick(SYMBOLS);
      }, 80);
    });

    // Stop reels one by one
    const results = [pick(SYMBOLS), pick(SYMBOLS), pick(SYMBOLS)];

    reels.forEach((reel, i) => {
      setTimeout(() => {
        clearInterval(intervalIds[i]);
        reel.classList.remove('spinning');
        reel.querySelector('.symbol').textContent = results[i];

        // Play a subtle click sound via Web Audio API
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 600 + i * 200;
          gain.gain.value = 0.08;
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } catch(e) {}

        // After last reel stops, evaluate
        if (i === 2) {
          setTimeout(() => resolve(results), 200);
        }
      }, 800 + i * 500);
    });
  }

  function resolve(results) {
    const [a, b, c] = results;
    let winnings = 0;
    let msg = '';
    let cls = 'lose';

    if (a === b && b === c) {
      // Jackpot — all three match
      winnings = bet * 10;
      msg = pick(AI_QUIPS_JACKPOT) + ` +${winnings} tokens!`;
      cls = 'jackpot';
    } else if (a === b || b === c || a === c) {
      // Two match
      winnings = bet * 3;
      msg = pick(AI_QUIPS_WIN) + ` +${winnings} tokens!`;
      cls = 'win';
    } else {
      msg = pick(AI_QUIPS_LOSE);
    }

    balance += winnings;
    messageEl.textContent = msg;
    messageEl.className = `message ${cls}`;
    addHistory(`${results.join(' ')} — ${winnings > 0 ? '+' + winnings : '-' + bet}`, winnings > 0);

    spinning = false;
    updateUI();

    if (balance < 10) {
      setTimeout(() => brokeOverlay.classList.add('show'), 600);
    }
  }

  spinBtn.addEventListener('click', spin);

  // Keyboard: spacebar to spin
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !spinning) {
      e.preventDefault();
      spin();
    }
  });

  // Bailout
  document.getElementById('bailout-btn').addEventListener('click', () => {
    balance = 1000;
    brokeOverlay.classList.remove('show');
    messageEl.textContent = "AI hallucinated 1,000 tokens into your account. You're welcome.";
    messageEl.className = 'message win';
    updateUI();
  });

  updateUI();
</script>

</body>
</html>
