<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 AI Slot Machine — Feed the Model™</title>
  <style>
    :root {
      --neon-blue: #00e5ff;
      --neon-pink: #ff2d95;
      --neon-green: #39ff14;
      --neon-yellow: #ffe600;
      --neon-orange: #ff6d00;
      --neon-red: #ff1744;
      --bg-dark: #0a0a1a;
      --bg-card: #111128;
      --bg-reel: #06060f;
      --text: #e0e0f0;
      --muted: #5a5a7a;
      --border: #222244;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 16px 60px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,229,255,.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(255,45,149,.04) 0%, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.08em;
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* Wallet */
    .wallet {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .wallet-section {
      display: flex;
      flex-direction: column;
    }

    .wallet-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .wallet-tokens {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--neon-yellow);
      font-variant-numeric: tabular-nums;
    }

    .wallet-net {
      font-size: 1.1rem;
      font-weight: 600;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .wallet-net.positive { color: var(--neon-green); }
    .wallet-net.negative { color: var(--neon-red); }
    .wallet-net.zero { color: var(--muted); }

    .bet-badge {
      background: rgba(255,45,149,.12);
      border: 1px solid rgba(255,45,149,.35);
      color: var(--neon-pink);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* Machine frame */
    .machine {
      background: var(--bg-card);
      border: 1.5px solid rgba(0,229,255,.2);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 60px rgba(0,229,255,.06), 0 0 120px rgba(255,45,149,.03);
    }

    /* Reels */
    .reels-container {
      display: flex;
      gap: 6px;
      justify-content: center;
      background: var(--bg-reel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      position: relative;
      overflow: hidden;
    }

    .reels-container::after {
      content: '';
      position: absolute;
      left: 8px;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      height: 80px;
      border-top: 2px solid rgba(255,230,0,.25);
      border-bottom: 2px solid rgba(255,230,0,.25);
      pointer-events: none;
      z-index: 5;
    }

    .reel {
      width: 100px;
      height: 240px;
      overflow: hidden;
      position: relative;
      border-radius: 6px;
      background: #08081a;
      border: 1px solid #1a1a36;
    }

    .reel::before, .reel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 70px;
      z-index: 3;
      pointer-events: none;
    }

    .reel::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(6,6,15,.95), transparent);
    }

    .reel::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(6,6,15,.95), transparent);
    }

    .reel.winning {
      border-color: var(--neon-yellow);
      box-shadow: 0 0 20px rgba(255,230,0,.4);
    }

    .reel-strip {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .symbol {
      width: 100px;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .symbol-emoji {
      font-size: 36px;
      line-height: 1;
    }

    .symbol-name {
      font-size: 0.55rem;
      color: var(--muted);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    /* Result message */
    .result-area {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 14px;
      margin: 14px 0;
      background: rgba(0,0,0,.3);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .result-msg {
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .result-msg.idle { color: var(--neon-blue); }
    .result-msg.spinning { color: var(--muted); }
    .result-msg.win { color: var(--neon-green); font-weight: 600; }
    .result-msg.jackpot { color: var(--neon-yellow); font-weight: 700; font-size: 0.95rem; animation: glow-pulse .5s ease-in-out infinite alternate; }
    .result-msg.lose { color: var(--neon-red); opacity: 0.85; }
    .result-msg.broke { color: var(--neon-orange); font-weight: 600; }

    @keyframes glow-pulse {
      from { text-shadow: 0 0 8px rgba(255,230,0,.3); }
      to { text-shadow: 0 0 20px rgba(255,230,0,.6); }
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
    }

    .btn-spin {
      flex: 1;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
      font-family: inherit;
    }

    .btn-spin:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,229,255,.3);
    }

    .btn-spin:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-spin:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-fund {
      padding: 14px 16px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-fund:hover {
      color: var(--neon-green);
      border-color: var(--neon-green);
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 14px;
    }

    .stat-box {
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
    }

    .stat-num {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--neon-blue);
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Paytable */
    .paytable {
      margin-top: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .paytable-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      background: rgba(0,0,0,.2);
    }

    .paytable-header span:first-child {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .paytable-arrow {
      color: var(--neon-blue);
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    .paytable-arrow.open { transform: rotate(180deg); }

    .paytable-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .paytable-content.open { max-height: 700px; }

    .paytable-inner {
      padding: 8px 16px 14px;
    }

    .pay-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 0.78rem;
    }

    .pay-row:last-child { border: none; }

    .pay-symbols { font-size: 0.95rem; letter-spacing: 0.15em; }
    .pay-desc { flex: 1; padding: 0 8px; color: var(--muted); font-size: 0.62rem; }
    .pay-value { font-weight: 700; color: var(--neon-yellow); }
    .pay-value.penalty { color: var(--neon-red); }

    .pay-footnote {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    /* Floating win tokens */
    @keyframes float-away {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .float-particle {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      font-size: 1.4rem;
      animation: float-away 1s ease-out forwards;
    }

    /* Shake animation for losses */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    .shake { animation: shake 0.3s ease-in-out; }

    /* Mobile */
    @media (max-width: 400px) {
      .reel { width: 85px; height: 210px; }
      .symbol { width: 85px; height: 70px; }
      .symbol-emoji { font-size: 30px; }
      .wallet { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">FEED THE MODEL</div>
      <div class="tagline">Your tokens. Our parameters. What could go wrong?</div>
    </header>

    <div class="wallet">
      <div class="wallet-section">
        <div class="wallet-label">Token Balance</div>
        <div class="wallet-tokens" id="balance">10,000</div>
      </div>
      <div class="bet-badge">Cost: 100 tokens/spin</div>
      <div class="wallet-section" style="align-items: flex-end;">
        <div class="wallet-label">Profit / Loss</div>
        <div class="wallet-net zero" id="netPL">+0</div>
      </div>
    </div>

    <main class="machine">
      <div class="reels-container" id="reelsContainer">
        <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
        <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
        <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
      </div>

      <div class="result-area">
        <div class="result-msg idle" id="resultMsg">Ready to burn tokens. The model is hungry.</div>
      </div>

      <div class="controls">
        <button class="btn-spin" id="btnSpin">Spin (100 tokens)</button>
        <button class="btn-fund" id="btnFund" title="Ask VCs for more compute">+ Raise Round</button>
      </div>

      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="statSpins">0</div><div class="stat-label">Spins</div></div>
        <div class="stat-box"><div class="stat-num" id="statWins">0</div><div class="stat-label">Wins</div></div>
        <div class="stat-box"><div class="stat-num" id="statBest">0</div><div class="stat-label">Best Win</div></div>
        <div class="stat-box"><div class="stat-num" id="statBurned">0</div><div class="stat-label">Burned</div></div>
      </div>
    </main>

    <div class="paytable">
      <div class="paytable-header" id="payHeader">
        <span>Reward Function / Paytable</span>
        <span class="paytable-arrow" id="payArrow">&#9660;</span>
      </div>
      <div class="paytable-content" id="payContent">
        <div class="paytable-inner" id="payInner"></div>
      </div>
    </div>

  </div>

<script>
"use strict";

// ── SYMBOLS ──
const SYMBOLS = [
  { emoji: '🤖', name: 'AGI',        triple: 10000, pair: 500,  weight: 1 },
  { emoji: '🧠', name: 'Brain',      triple: 3000,  pair: 200,  weight: 2 },
  { emoji: '⚡', name: 'GPU',        triple: 1500,  pair: 100,  weight: 3 },
  { emoji: '🔥', name: 'Fine-tune',  triple: 800,   pair: 60,   weight: 4 },
  { emoji: '📊', name: 'Dataset',    triple: 500,   pair: 40,   weight: 5 },
  { emoji: '💾', name: 'Checkpoint', triple: 300,   pair: 25,   weight: 5 },
  { emoji: '💭', name: 'Halluc.',    triple: -200,  pair: 0,    weight: 3 },
  { emoji: '🪲', name: 'Bug',        triple: -300,  pair: 0,    weight: 2 },
];

// Weighted pool for random selection
const POOL = [];
SYMBOLS.forEach((s, i) => { for (let w = 0; w < s.weight; w++) POOL.push(i); });

const SPIN_COST = 100;
const INITIAL_TOKENS = 10000;
const CELL_HEIGHT = 80;
const VISIBLE_ROWS = 3;

// ── STATE ──
let balance = INITIAL_TOKENS;
let isSpinning = false;
let totalSpins = 0;
let totalWins = 0;
let bestWin = 0;
let totalBurned = 0;
let fundingRound = 0;

// ── HELPERS ──
function randomSymbol() {
  return POOL[Math.floor(Math.random() * POOL.length)];
}

function fmt(n) { return n.toLocaleString(); }

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── REEL SETUP ──
function createCell(symbolIndex) {
  const s = SYMBOLS[symbolIndex];
  const div = document.createElement('div');
  div.className = 'symbol';
  div.innerHTML = `<span class="symbol-emoji">${s.emoji}</span><span class="symbol-name">${s.name}</span>`;
  return div;
}

function initReel(reelIndex) {
  const strip = document.getElementById(`strip${reelIndex}`);
  strip.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    strip.appendChild(createCell(randomSymbol()));
  }
  strip.style.transition = 'none';
  strip.style.transform = `translateY(-${CELL_HEIGHT * 3}px)`;
}

function initAllReels() {
  for (let i = 0; i < 3; i++) initReel(i);
}

// ── REEL ANIMATION ──
function animateReel(reelIndex, targetSymbol, duration) {
  return new Promise(resolve => {
    const strip = document.getElementById(`strip${reelIndex}`);
    strip.innerHTML = '';

    const spinCells = 25 + reelIndex * 5;

    for (let i = 0; i < spinCells; i++) {
      strip.appendChild(createCell(randomSymbol()));
    }
    // Target symbol at center of final visible window
    strip.appendChild(createCell(targetSymbol));
    // Padding after
    for (let i = 0; i < 3; i++) {
      strip.appendChild(createCell(randomSymbol()));
    }

    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0)';

    const finalY = -(spinCells - 1) * CELL_HEIGHT;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        strip.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.6, 0.25, 1)`;
        strip.style.transform = `translateY(${finalY}px)`;

        setTimeout(resolve, duration + 30);
      });
    });
  });
}

// ── PAYOUT LOGIC ──
function calculatePayout(a, b, c) {
  // Triple
  if (a === b && b === c) {
    const s = SYMBOLS[a];
    if (s.triple < 0) return { amount: s.triple, type: 'penalty' };
    return { amount: s.triple, type: 'jackpot' };
  }
  // Pair
  const pairIdx = (a === b) ? a : (b === c) ? b : (a === c) ? a : -1;
  if (pairIdx >= 0 && SYMBOLS[pairIdx].pair > 0) {
    return { amount: SYMBOLS[pairIdx].pair, type: 'pair' };
  }
  return { amount: 0, type: 'loss' };
}

// ── MESSAGES ──
const JACKPOT_MESSAGES = {
  0: (n) => `🤖 AGI UNLOCKED! +${fmt(n)} tokens! Skynet sends its regards.`,
  1: (n) => `🧠 EMERGENT BEHAVIOR! +${fmt(n)} tokens! Consciousness is just matrix multiplication.`,
  2: (n) => `⚡ GPU SINGULARITY! +${fmt(n)} tokens! Jensen is smiling upon you.`,
  3: (n) => `🔥 PERFECT FINE-TUNE! +${fmt(n)} tokens! Loss hit 0. Paper accepted.`,
  4: (n) => `📊 DATA JACKPOT! +${fmt(n)} tokens! Found uncurated internet gold.`,
  5: (n) => `💾 CHECKPOINT LOADED! +${fmt(n)} tokens! Restoring from best epoch.`,
};

const PAIR_MESSAGES = (n) => pick([
  `Partial match. +${fmt(n)} tokens. Not bad for a stochastic parrot.`,
  `Two outta three. +${fmt(n)} tokens. Like a model that's almost aligned.`,
  `Pair found. +${fmt(n)} tokens. Reward signal: lukewarm.`,
  `Decent inference. +${fmt(n)} tokens. The benchmark looks okay.`,
  `Matched a pair! +${fmt(n)} tokens. Top-2 accuracy achieved.`,
  `Almost coherent output. +${fmt(n)} tokens. RLHF nods approvingly.`,
]);

const LOSS_MESSAGES = () => pick([
  "Model confidently predicted a win. It was wrong. As usual.",
  "Attention attended to nothing useful. 100 tokens vaporized.",
  "Output: undefined. Cost: 100 tokens. Value: also undefined.",
  "The AI said it would win this time. The AI lied.",
  "'Just one more spin' — every AI founder's last words.",
  "Tokens entered the transformer. Tokens did not come back.",
  "GPT-7 analyzed your luck. Conclusion: skill issue.",
  "Your tokens were used to train a model that predicts you'll lose.",
  "Catastrophic forgetting: the model forgot how to win.",
  "Loss function: your actual loss. 100 tokens gone.",
  "The model hallucinates you won! Unfortunately, reality disagrees.",
  "RLHF feedback: 👎👎👎. Try a different prompt?",
  "Chain-of-thought: Step 1: Spin. Step 2: Lose. Step 3: Cope.",
  "Your inference budget has been reallocated to Sam Altman's salary.",
  "Error 402: Payment processed. Win not included.",
  "Temperature too high. Your tokens melted.",
  "Transformer bottleneck: input=hope, output=nothing.",
]);

const PENALTY_MESSAGES = {
  halluc: "💭💭💭 TRIPLE HALLUCINATION! The model made up tokens you don't have!",
  bug: "🪲🪲🪲 TRIPLE BUG! Prod is down. Tokens deployed to incident response.",
};

const BROKE_MESSAGES = () => pick([
  "Token balance: 0. Your startup has reached the deadpool.",
  "Out of tokens. Even ChatGPT has a free tier. You don't.",
  "Bankrupt! Time to pivot to 'AI for AI token generation.'",
  "No tokens left. The model is now running on hopes and dreams.",
]);

// ── UI UPDATE ──
function updateUI() {
  document.getElementById('balance').textContent = fmt(balance);

  const net = balance - INITIAL_TOKENS;
  const netEl = document.getElementById('netPL');
  netEl.textContent = (net >= 0 ? '+' : '') + fmt(net);
  netEl.className = 'wallet-net ' + (net > 0 ? 'positive' : net < 0 ? 'negative' : 'zero');

  document.getElementById('statSpins').textContent = fmt(totalSpins);
  document.getElementById('statWins').textContent = fmt(totalWins);
  document.getElementById('statBest').textContent = fmt(bestWin);
  document.getElementById('statBurned').textContent = fmt(totalBurned);

  document.getElementById('btnSpin').disabled = isSpinning || balance < SPIN_COST;
}

function setMessage(text, type) {
  const el = document.getElementById('resultMsg');
  el.textContent = text;
  el.className = 'result-msg ' + type;
}

function spawnParticles() {
  const container = document.getElementById('reelsContainer');
  const particles = ['🪙', '✨', '💰', '⚡', '💎', '🌟'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'float-particle';
      p.textContent = pick(particles);
      p.style.left = (10 + Math.random() * 80) + '%';
      p.style.top = (20 + Math.random() * 60) + '%';
      container.appendChild(p);
      setTimeout(() => p.remove(), 1100);
    }, i * 70);
  }
}

// ── SOUND (Web Audio API) ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type = 'square', volume = 0.08) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playReelStop() { playTone(600, 0.08, 'sine', 0.06); }
function playWin() {
  playTone(523, 0.1, 'sine', 0.1);
  setTimeout(() => playTone(659, 0.1, 'sine', 0.1), 100);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.1), 200);
}
function playJackpot() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i * 120);
  });
}
function playLose() { playTone(200, 0.2, 'sawtooth', 0.04); }

// ── SPIN ──
async function spin() {
  if (isSpinning || balance < SPIN_COST) return;
  isSpinning = true;

  // Resume audio context on user gesture
  if (audioCtx.state === 'suspended') audioCtx.resume();

  balance -= SPIN_COST;
  totalBurned += SPIN_COST;
  totalSpins++;
  updateUI();

  // Clear previous win highlights
  for (let i = 0; i < 3; i++) {
    document.getElementById(`reel${i}`).classList.remove('winning');
  }

  setMessage('Inference in progress... burning tokens...', 'spinning');
  document.getElementById('btnSpin').disabled = true;

  // Determine results
  const results = [randomSymbol(), randomSymbol(), randomSymbol()];

  // Animate with stagger
  const animations = [
    animateReel(0, results[0], 800),
    animateReel(1, results[1], 1200),
    animateReel(2, results[2], 1600),
  ];

  // Play reel stop sounds
  setTimeout(playReelStop, 800);
  setTimeout(playReelStop, 1200);
  setTimeout(playReelStop, 1600);

  await Promise.all(animations);

  // Evaluate result
  const result = calculatePayout(results[0], results[1], results[2]);

  if (result.type === 'penalty') {
    balance = Math.max(0, balance + result.amount);
    const msg = results[0] === 6 ? PENALTY_MESSAGES.halluc : PENALTY_MESSAGES.bug;
    setMessage(msg, 'lose');
    document.getElementById('reelsContainer').classList.add('shake');
    setTimeout(() => document.getElementById('reelsContainer').classList.remove('shake'), 300);
    playLose();
  } else if (result.type === 'jackpot') {
    balance += result.amount;
    totalWins++;
    if (result.amount > bestWin) bestWin = result.amount;
    for (let i = 0; i < 3; i++) document.getElementById(`reel${i}`).classList.add('winning');
    setMessage(JACKPOT_MESSAGES[results[0]](result.amount), 'jackpot');
    spawnParticles();
    playJackpot();
  } else if (result.type === 'pair') {
    balance += result.amount;
    totalWins++;
    if (result.amount > bestWin) bestWin = result.amount;
    // Highlight matching reels
    if (results[0] === results[1]) { document.getElementById('reel0').classList.add('winning'); document.getElementById('reel1').classList.add('winning'); }
    if (results[1] === results[2]) { document.getElementById('reel1').classList.add('winning'); document.getElementById('reel2').classList.add('winning'); }
    if (results[0] === results[2]) { document.getElementById('reel0').classList.add('winning'); document.getElementById('reel2').classList.add('winning'); }
    setMessage(PAIR_MESSAGES(result.amount), 'win');
    playWin();
  } else {
    setMessage(LOSS_MESSAGES(), 'lose');
    playLose();
  }

  updateUI();
  isSpinning = false;

  if (balance < SPIN_COST) {
    setTimeout(() => setMessage(BROKE_MESSAGES(), 'broke'), 1800);
  }
}

  { amount: 5000,   msg: "Seed round closed! +5,000 tokens. Valuation based on vibes." },
  { amount: 10000,  msg: "Series A! +10,000 tokens. VCs loved your 'AI-powered AI' pitch." },
  { amount: 25000,  msg: "Series B! +25,000 tokens. Your deck said 'AGI by Q3.' They bought it." },
  { amount: 50000,  msg: "Series C! +50,000 tokens. Revenue? 'We're pre-revenue, pre-product, pre-idea.'" },
  { amount: 100000, msg: "Series D! +100,000 tokens. The board wants to know what tokens even are." },
  { amount: 500000, msg: "IPO! +500,000 tokens. Stock price: pure speculation. Like your model's outputs." },
];

document.getElementById('btnFund').addEventListener('click', () => {
  const round = FUNDING_ROUNDS[Math.min(fundingRound, FUNDING_ROUNDS.length - 1)];
  balance += round.amount;

  setMessage(round.msg, 'idle');
  updateUI();
});

// ── SPIN BUTTON ──
document.getElementById('btnSpin').addEventListener('click', spin);

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.target.matches('button, input, textarea')) {
    e.preventDefault();
    spin();
  }
});

// ── PAYTABLE ──
function buildPaytable() {
  const inner = document.getElementById('payInner');

  SYMBOLS.forEach((s, i) => {
    const isPenalty = s.triple < 0;
    const tripleRow = document.createElement('div');
    tripleRow.className = 'pay-row';
    tripleRow.innerHTML = `
      <span class="pay-symbols">${s.emoji}${s.emoji}${s.emoji}</span>
      <span class="pay-desc">${s.name} x3</span>
      <span class="pay-value ${isPenalty ? 'penalty' : ''}">${isPenalty ? '' : '+'}${fmt(s.triple)}</span>
    `;
    inner.appendChild(tripleRow);

    if (s.pair > 0) {
      const pairRow = document.createElement('div');
      pairRow.className = 'pay-row';
      pairRow.innerHTML = `
        <span class="pay-symbols" style="font-size:0.8rem">${s.emoji}${s.emoji} ✦</span>
        <span class="pay-desc">${s.name} x2 (any position)</span>
        <span class="pay-value">+${fmt(s.pair)}</span>
      `;
      inner.appendChild(pairRow);
    }
  });

  const note = document.createElement('div');
  note.className = 'pay-footnote';
  note.textContent = 'Negative payouts are features, not bugs. The model is working as intended.';
  inner.appendChild(note);
}

document.getElementById('payHeader').addEventListener('click', () => {
  document.getElementById('payContent').classList.toggle('open');
  document.getElementById('payArrow').classList.toggle('open');
});

// ── INIT ──
initAllReels();
buildPaytable();
updateUI();
</script>
