<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Slots</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="confetti"></canvas>

  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="logo-text">TOKEN<span>SLOTS</span></span>
    </div>
    <div class="balance">
      <span class="balance-label">Balance</span>
      <span id="token-count">1000.00</span>
    </div>
  </header>

  <main class="stage">
    <div class="reels-window">
      <div class="reel-container">
        <div class="reel" id="reel-0"></div>
        <div class="reel" id="reel-1"></div>
        <div class="reel" id="reel-2"></div>
      </div>
      <div class="payline"></div>
      <div class="reel-fade reel-fade-top"></div>
      <div class="reel-fade reel-fade-bottom"></div>
    </div>

    <div id="message" class="message"></div>
  </main>

  <footer class="controlbar">
    <div class="bet-group">
      <span class="ctrl-label">Bet</span>
      <div class="bet-controls">
        <button id="bet-down" aria-label="Decrease bet">−</button>
        <span id="bet-amount">10</span>
        <button id="bet-up" aria-label="Increase bet">+</button>
      </div>
    </div>

    <button id="spin-btn" class="spin-button">
      <span class="spin-text">SPIN</span>
    </button>

    <button id="info-btn" class="info-btn" aria-label="Paytable">i</button>
  </footer>

  <div id="paytable" class="paytable-overlay" hidden>
    <div class="paytable-card">
      <div class="paytable-header">
        <h2>Paytable</h2>
        <button id="info-close" aria-label="Close">×</button>
      </div>
      <div class="paytable-grid">
        <div class="pay-row"><span>&#x1F916;&#x1F916;&#x1F916;</span><b>50×</b></div>
        <div class="pay-row"><span>&#x1F4B8;&#x1F4B8;&#x1F4B8;</span><b>25×</b></div>
        <div class="pay-row"><span>&#x1F525;&#x1F525;&#x1F525;</span><b>15×</b></div>
        <div class="pay-row"><span>&#x1F4A1;&#x1F4A1;&#x1F4A1;</span><b>10×</b></div>
        <div class="pay-row"><span>&#x1F9E0;&#x1F9E0;&#x1F9E0;</span><b>8×</b></div>
        <div class="pay-row"><span>&#x26A0;&#xFE0F;&#x26A0;&#xFE0F;&#x26A0;&#xFE0F;</span><b>5×</b></div>
        <div class="pay-row"><span>Any pair</span><b>2×</b></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
