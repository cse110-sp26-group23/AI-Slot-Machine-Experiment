<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SLOTS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">SLOTS</div>
      <div class="balance-chip">
        <span class="coin">◆</span>
        <span id="balance">1000.00</span>
        <button id="buy-btn" class="add-btn" aria-label="Add tokens">+</button>
      </div>
    </header>

    <main class="stage">
      <div class="machine">
        <div class="reels" id="reels">
          <div class="reel"><div class="strip"></div></div>
          <div class="reel"><div class="strip"></div></div>
          <div class="reel"><div class="strip"></div></div>
        </div>
        <div class="payline"></div>
        <div class="win-overlay" id="win-overlay"><span id="win-amount"></span></div>
      </div>
    </main>

    <footer class="dock">
      <div class="bet-group">
        <label>Bet</label>
        <div class="bet-control">
          <button id="bet-down" class="ctl">−</button>
          <div class="bet-value"><span class="coin">◆</span><span id="bet-value">10.00</span></div>
          <button id="bet-up" class="ctl">+</button>
        </div>
      </div>
      <button id="spin-btn" class="spin-btn">SPIN</button>
      <div class="sound-group">
        <button id="sound-btn" class="ctl sound" aria-label="Toggle sound">♪</button>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
