<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Burner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="fx"></canvas>

  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span class="brand-name">TOKEN&nbsp;BURNER</span>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-label">Balance</span><span class="stat-value" id="balance">1000.00</span></div>
      <div class="stat"><span class="stat-label">Last Win</span><span class="stat-value win" id="last-win">0.00</span></div>
      <div class="stat mute"><span class="stat-label">Spins</span><span class="stat-value" id="spin-count">0</span></div>
      <button class="icon-btn" id="sound-btn" aria-label="Toggle sound" title="Toggle sound">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <div class="machine" id="machine">
      <div class="win-line"></div>
      <div class="reels">
        <div class="reel" id="reel-0"><div class="strip" id="strip-0"></div></div>
        <div class="reel" id="reel-1"><div class="strip" id="strip-1"></div></div>
        <div class="reel" id="reel-2"><div class="strip" id="strip-2"></div></div>
      </div>
      <div class="win-banner" id="win-banner"><span id="win-banner-text"></span></div>
    </div>

    <div class="message" id="message">Press SPIN or hit Space to begin.</div>
  </main>

  <footer class="controls">
    <div class="bet">
      <span class="ctrl-label">Bet</span>
      <button class="pill" id="bet-down" aria-label="Decrease bet">−</button>
      <span class="bet-value" id="bet-display">10</span>
      <button class="pill" id="bet-up" aria-label="Increase bet">+</button>
    </div>
    <button class="spin-btn" id="spin-btn">
      <span class="spin-label">SPIN</span>
      <span class="spin-hint">SPACE</span>
    </button>
    <div class="bet">
      <button class="pill ghost" id="max-bet">MAX</button>
      <button class="pill ghost" id="refill-btn">REFILL</button>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
