<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1923" />
<title>Slots</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">SLOTS</div>
      <div class="balance-chip" id="balance-chip">
        <span class="coin" aria-hidden="true">◆</span>
        <span id="balance">1,000.00</span>
        <button id="buy-btn" class="add-btn" aria-label="Add tokens">+</button>
      </div>
    </header>

    <main class="stage">
      <div class="machine" id="machine">
        <div class="reels" id="reels">
          <div class="reel"><div class="strip"></div></div>
          <div class="reel"><div class="strip"></div></div>
          <div class="reel"><div class="strip"></div></div>
        </div>
        <div class="payline" aria-hidden="true"></div>
        <canvas class="fx" id="fx" aria-hidden="true"></canvas>
        <div class="win-overlay" id="win-overlay" aria-live="polite">
          <div class="win-label" id="win-label">WIN</div>
          <div class="win-amount" id="win-amount"></div>
        </div>
      </div>
    </main>

    <footer class="dock">
      <div class="bet-group">
        <label for="bet-value">Bet</label>
        <div class="bet-control">
          <button id="bet-down" class="ctl" aria-label="Decrease bet">−</button>
          <div class="bet-value">
            <span class="coin" aria-hidden="true">◆</span>
            <span id="bet-value">10.00</span>
          </div>
          <button id="bet-up" class="ctl" aria-label="Increase bet">+</button>
        </div>
      </div>

      <button id="spin-btn" class="spin-btn" aria-label="Spin">
        <span class="spin-label">SPIN</span>
      </button>

      <div class="sound-group">
        <button id="sound-btn" class="ctl sound" aria-label="Toggle sound">♪</button>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
